name: Build & Push Spring Boot Docker

on:
  push:
    branches: ["production"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    steps:
      # 1. Lấy code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Build JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Validate docker-compose config
      - name: Validate docker compose
        run: docker compose config

      # 5. Login Docker Hub
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 6. Build service image via docker compose
      - name: Build app service image
        run: docker compose build app

      # 7. Push image bằng docker compose
      - name: Push app service image
        run: docker compose push app

  deploy_lightsail:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy docker compose file to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_LIGHTSAIL_HOST }}
          username: ${{ secrets.AWS_LIGHTSAIL_USER }}
          key: ${{ secrets.AWS_LIGHTSAIL_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ secrets.LIGHTSAIL_APP_DIR }}

      - name: Deploy to AWS Lightsail
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AWS_LIGHTSAIL_HOST }}
          username: ${{ secrets.AWS_LIGHTSAIL_USER }}
          key: ${{ secrets.AWS_LIGHTSAIL_SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ secrets.LIGHTSAIL_APP_DIR }}
            export DOCKERHUB_USERNAME=${{ secrets.DOCKER_USERNAME }}
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            docker compose pull app
            docker compose up -d app
            docker compose ps